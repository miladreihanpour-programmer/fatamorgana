name: Weekly SHOCAPP Extraction

on:
  schedule:
    # Every Sunday at 7:00 AM Rome time (UTC+1 winter / UTC+2 summer)
    # Using 05:00 UTC to cover CET morning
    - cron: '0 5 * * 0'
  workflow_dispatch: # Allow manual trigger from GitHub UI / phone

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 5
        env:
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000
          npm_config_fetch_retries: 5

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run SHOCAPP extraction
        env:
          GELATERIA_USER: ${{ secrets.GELATERIA_USER }}
          GELATERIA_PASS: ${{ secrets.GELATERIA_PASS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '104393673'
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: 'miladreihanpour@gmail.com,saeedgar@yahoo.com'
        run: node src/shocappExtractor.js

      - name: Upload XLSX/ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shocapp-data-${{ github.run_number }}
          path: output/shocapp_*
          retention-days: 90

      - name: Commit updated output to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ls -la output/
          git add -A output/
          git add -f output/shocapp_*.xlsx output/shocapp_*.zip
          git status
          git diff --staged --quiet && echo 'No changes to commit' || (git commit -m "Weekly SHOCAPP data $(date -u +%Y-%m-%d)" && git push)
