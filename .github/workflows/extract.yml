name: SHOCAPP Extraction

# Triggered by the mobile app via Render server → GitHub API
on:
  workflow_dispatch:
    inputs:
      shop_id:
        description: 'Shop identifier (e.g. shop1, shop2)'
        required: true
        default: 'shop1'
      shop_user:
        description: 'SHOCAPP username for this shop'
        required: true
        default: ''
      shop_pass:
        description: 'SHOCAPP password for this shop'
        required: true
        default: ''
      sync_url:
        description: 'Render server URL to push results to'
        required: true
        default: ''

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Run extraction
        run: node src/shocappExtractor.js
        env:
          # Shop-specific credentials (passed from Render server)
          GELATERIA_USER:   ${{ inputs.shop_user }}
          GELATERIA_PASS:   ${{ inputs.shop_pass }}
          SHOP_ID:          ${{ inputs.shop_id }}
          # Sync URL (Render server endpoint)
          SYNC_URL:         ${{ inputs.sync_url }}
          JWT_SECRET:       ${{ secrets.JWT_SECRET }}
          # Telegram (optional — sends PDF after extraction)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          AUTO_SEND_TELEGRAM: 'true'
